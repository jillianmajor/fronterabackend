# Local stack: Postgres + migrations/seed + Nest API (hot reload).
# Usage: docker compose up --build
# DB only: docker compose up postgres -d
#
# API mounts only ./src so node_modules stays from the image (npm ci at build).
# After package.json changes: docker compose build api

name: frontera

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frontera
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d frontera']
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: 'no'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/frontera
      DATABASE_SSL: 'false'
    command: sh -c "npm run db:migrate && npm run db:seed:all"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: '3000'
      FRONTERA_API_PUBLIC_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/frontera
      DATABASE_SSL: 'false'
    volumes:
      # Hot-reload TypeScript only — do not mount the whole repo (breaks node_modules).
      - ./src:/app/src
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
