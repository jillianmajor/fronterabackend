service: frontera-scheduling

frameworkVersion: '3'
useDotenv: true

plugins:
  - serverless-domain-manager

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${env:FRONTERA_AWS_REGION, 'us-east-1'}
  timeout: 60
  memorySize: 1024
  httpApi:
    payload: '2.0'
    # Browser calls from Vite (localhost:8080) or the portal need preflight at API Gateway.
    cors:
      allowedOrigins:
        - http://localhost:8080
        - http://localhost:5173
        - http://127.0.0.1:8080
        - http://127.0.0.1:5173
        # Lovable / hosted portal (origin only — no path); add production domain when live
        - https://id-preview--128edd29-a6a6-490c-a898-4d428991ac14.lovable.app
        # AWS Amplify (production frontend)
        - https://main.dwerzw421qf76.amplifyapp.com
        # Production portal (custom domain when live)
        - https://fronteraportal.com
        - https://www.fronteraportal.com
      allowedHeaders:
        - Content-Type
        - Authorization
        - Accept
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      maxAge: 86400
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL}
    SUPABASE_URL: ${env:SUPABASE_URL, ''}
    SUPABASE_JWKS_URL: ${env:SUPABASE_JWKS_URL, ''}
    SUPABASE_JWT_SECRET: ${env:SUPABASE_JWT_SECRET, ''}
    SUPABASE_SERVICE_ROLE_KEY: ${env:SUPABASE_SERVICE_ROLE_KEY, ''}
    # Set true only to bypass JWT guards (e.g. temporary debugging). Requires SUPABASE_URL (JWKS) when false.
    AUTH_DISABLED: ${env:AUTH_DISABLED, 'false'}
    DOCUMENTS_BUCKET: ${self:custom.documentsBucketName}
    EXPORTS_BUCKET: ${self:custom.exportsBucketName}
    FRONTERA_AWS_REGION: ${self:provider.region}
    SES_FROM_EMAIL: ${self:custom.sesFromEmail}
    SES_CONFIGURATION_SET: ${self:custom.sesConfigurationSetName, ''}
    # Production portal + API URLs — set in custom.* below (do not let empty .env vars override).
    FRONTERA_APP_URL: ${self:custom.appUrl}
    FRONTERA_API_PUBLIC_URL: ${self:custom.apiPublicUrl}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: '*'
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - arn:aws:s3:::${self:custom.documentsBucketName}/*
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - arn:aws:s3:::${self:custom.exportsBucketName}/*

custom:
  documentsBucketName: frontera-${sls:stage}-secure-documents
  exportsBucketName: frontera-${sls:stage}-exports
  sesFromEmail: ${env:SES_FROM_EMAIL, 'notifications@fronteraportal.com'}
  sesConfigurationSetName: frontera-${sls:stage}-scheduling
  # Invite email links + post-accept redirect (update appUrl when production portal domain is live).
  apiPublicUrl: https://api.fronteraportal.com
  appUrl: https://main.dwerzw421qf76.amplifyapp.com/login?portal=provider
  apiDomainName: api.fronteraportal.com
  apiCertificateArn: arn:aws:acm:us-east-1:567764214720:certificate/a37b431e-9835-4ef9-a683-3f4f16d4b489
  customDomain:
    domainName: ${self:custom.apiDomainName}
    certificateArn: ${self:custom.apiCertificateArn}
    basePath: ''
    stage: ${self:provider.stage}
    createRoute53Record: true
    createRoute53IPv6Record: true
    endpointType: regional
    securityPolicy: tls_1_2
    apiType: http
    autoDomain: true

package:
  patterns:
    - dist/**
    - node_modules/**
    - package.json
    - '!src/**'
    - '!test/**'
    - '!.git/**'

functions:
  api:
    handler: dist/src/lambda.handler
    timeout: 300
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

resources:
  Conditions:
    CreateSesEmailIdentity:
      Fn::Not:
        - Fn::Equals:
            - ${self:custom.sesFromEmail, ''}
            - ''

  Resources:
    SecureDocumentsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.documentsBucketName}

    ExportsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.exportsBucketName}

    SesConfigurationSet:
      Type: AWS::SES::ConfigurationSet
      Properties:
        Name: ${self:custom.sesConfigurationSetName}

    SesEmailIdentity:
      Type: AWS::SES::EmailIdentity
      Condition: CreateSesEmailIdentity
      Properties:
        EmailIdentity: ${self:custom.sesFromEmail}

  Outputs:
    ApiUrl:
      Description: Custom domain API base URL (invite emails and Swagger)
      Value: ${self:custom.apiPublicUrl}
    ApiGatewayUrl:
      Description: Raw API Gateway URL (fallback)
      Value:
        Fn::Join:
          - ''
          - - 'https://'
            - Ref: HttpApi
            - '.execute-api.'
            - Ref: AWS::Region
            - '.amazonaws.com'
    DocumentsBucketName:
      Value: ${self:custom.documentsBucketName}
    ExportsBucketName:
      Value: ${self:custom.exportsBucketName}
    SesFromEmail:
      Value: ${self:custom.sesFromEmail}
    SesConfigurationSet:
      Value: ${self:custom.sesConfigurationSetName}
    SesEmailIdentityHint:
      Condition: CreateSesEmailIdentity
      Description: Verify this identity in SES console if deploy email did not auto-verify
      Value: ${self:custom.sesFromEmail}
