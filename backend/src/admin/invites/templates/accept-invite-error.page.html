<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Invite link invalid</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f4f6f8;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        background: #fff;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      }
      h1 { margin: 0 0 12px; font-size: 20px; color: #1e3a5f; }
      p { margin: 0; font-size: 15px; line-height: 1.5; color: #444; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Unable to open invite</h1>
      <p>{{message}}</p>
    </div>
  </body>
</html>
