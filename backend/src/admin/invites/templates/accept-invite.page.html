<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set up your Frontera account</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #f4f6f8;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }
      .header {
        background: #1e3a5f;
        color: #fff;
        padding: 20px 24px;
        font-size: 18px;
        font-weight: 600;
      }
      .body { padding: 24px; }
      p { margin: 0 0 12px; font-size: 15px; line-height: 1.5; color: #333; }
      label {
        display: block;
        margin: 16px 0 6px;
        font-size: 14px;
        font-weight: 500;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 10px 12px;
        font-size: 15px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
      }
      input[readonly] { background: #f8fafc; color: #64748b; }
      button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: #2563eb;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover { background: #1d4ed8; }
      .error {
        margin-bottom: 16px;
        padding: 12px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 6px;
        color: #b91c1c;
        font-size: 14px;
      }
      .hint { font-size: 13px; color: #64748b; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="header">Frontera Scheduling</div>
      <div class="body">
        <p>Hi {{firstName}}, set a password to activate your provider account.</p>
        {{errorBlock}}
        <form method="post" action="{{formAction}}">
          <input type="hidden" name="token" value="{{token}}" />
          <label for="email">Email</label>
          <input id="email" type="email" name="email" value="{{email}}" readonly />
          <label for="password">Password</label>
          <input id="password" type="password" name="password" minlength="8" autocomplete="new-password" required />
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" type="password" name="confirmPassword" minlength="8" autocomplete="new-password" required />
          <p class="hint">Use at least 8 characters.</p>
          <button type="submit">Activate account</button>
        </form>
      </div>
    </div>
  </body>
</html>
